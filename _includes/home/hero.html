<div id="hero" class="site-header large-header">
    <div class="container mx-auto text-center py-10 px-5 min-h-10">
      <div class="logo w-full md:w-1/3">
        <img src="/assets/images/branding/logo.png" alt="Logo" class="text-center mx-auto ">
        <h5 class="site-tagline">Tecnología cívica, política digital, datos abiertos</h5>
      </div>
      {% if site.data.navigation %}
      <nav class="nav float-right">
        {% for item in site.data.navigation %}
          <a class="nav-item {% if page.url == item.url %}active{% endif %} font-bold" href="{{ item.url | relative_url }}">
            {{ item.title }}
          </a>
        {% endfor %}
      </nav>
    {% endif %}
    </div>
</div>
